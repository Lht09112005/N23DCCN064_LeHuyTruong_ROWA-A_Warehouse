<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>SmartWarehouse Center</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 + ReactDOM + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { background-color: #f8fafc; color: #0f172a; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .node-pulse-up { box-shadow: 0 0 15px 2px rgba(74, 222, 128, 0.4); }
    .node-pulse-down { box-shadow: 0 0 15px 2px rgba(248, 113, 113, 0.6); animation: pulse-red 2s infinite; }
    .node-pulse-rec { box-shadow: 0 0 15px 2px rgba(250, 204, 21, 0.5); }
    
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(248, 113, 113, 0); }
      100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
    }
    
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    .anim-line {
      stroke-dasharray: 5,5;
      animation: dash 1s linear infinite;
    }
  </style>
</head>
<body class="min-h-screen">

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const NodeStatus = { UP: 'UP', DOWN: 'DOWN', RECOVERING: 'RECOVERING' };
const ts = () => new Date().toLocaleTimeString('vi-VN', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
const txLabel = (id) => id > 0 ? `TX-${String(id).padStart(3,'0')}` : '—';

/* ─── COMPONENTS ───────────────────────────────────────────────────────── */
const Toast = ({ toast, onDismiss }) => {
  useEffect(() => {
    if (toast) { const t = setTimeout(onDismiss, 3500); return () => clearTimeout(t); }
  }, [toast, onDismiss]);
  if (!toast) return null;
  return (
    <div className="fixed top-4 right-4 z-50 animate-[slideIn_0.3s_ease-out]">
      <div className={`p-4 rounded-xl shadow-xl flex items-start gap-3 w-80 border ${
        toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-emerald-50 border-emerald-200 text-emerald-800'
      }`}>
        <div className="mt-0.5">
          {toast.type === 'error' ? '❌' : '✅'}
        </div>
        <div>
          <div className="font-bold text-sm mb-1">{toast.title}</div>
          <div className="text-xs opacity-90 leading-snug">{toast.message}</div>
        </div>
      </div>
    </div>
  );
};

/* ─── RECOVERY LOG PANEL ─────────────────────────────────────────────────── */
const RecoveryLogPanel = ({ entries }) => (
  <div className="bg-white shadow-sm border border-slate-200 rounded-2xl overflow-hidden h-full flex flex-col">
    <div className="px-4 py-3 bg-amber-50 border-b border-amber-100 flex items-center gap-2">
      <span className="text-amber-600 text-sm">📋</span>
      <span className="text-sm font-bold text-amber-900">Hàng Đợi Đồng Bộ (Recovery Log)</span>
      <span className="ml-auto mono text-xs text-amber-700 bg-amber-200/50 px-2 py-0.5 rounded-full">
        {entries.length} giao dịch chờ
      </span>
    </div>
    <div className="flex-1 overflow-y-auto p-3 space-y-2 h-40">
      {entries.length === 0 ? (
        <div className="text-center py-6 text-slate-400 text-xs">Hiện không có giao dịch nào đang chờ đồng bộ</div>
      ) : (
        entries.map((e, i) => (
          <div key={i} className="bg-white border border-slate-200 rounded-lg p-2.5 shadow-sm">
            <div className="flex items-center justify-between mb-1.5">
              <span className="mono text-xs font-bold text-slate-700">{txLabel(e.txId)}</span>
              <span className="mono text-[10px] text-slate-400">{e.time}</span>
            </div>
            <div className="mono text-xs text-slate-600 bg-slate-50 px-2 py-1 rounded">
              {e.sku}: <span className="text-red-500 line-through mr-1">{e.oldQty}</span>
              <span className="text-slate-400">→</span>
              <span className="text-emerald-600 font-bold ml-1">{e.newQty}</span>
            </div>
            <div className="mt-1.5 text-[10px] text-slate-500 font-medium">
              Thiếu tại: {(e.missedBy || []).map(n => (
                <span key={n} className="inline-block bg-red-50 text-red-600 border border-red-100 rounded px-1 mr-1">{n}</span>
              ))}
            </div>
          </div>
        ))
      )}
    </div>
  </div>
);

/* ─── APP ──────────────────────────────────────────────────────────────── */
function App() {
  const [selectedSku, setSelectedSku] = useState("SKU0001");
  const [deltaValue, setDeltaValue] = useState("");
  const [nodes, setNodes] = useState({
    WHBDG: { id: 'WHBDG', status: NodeStatus.UP, quantity: 100, lastTxId: 0 },
    WHDPS: { id: 'WHDPS', status: NodeStatus.UP, quantity: 100, lastTxId: 0 },
    WHJKT: { id: 'WHJKT', status: NodeStatus.UP, quantity: 100, lastTxId: 0 },
    WHSBY: { id: 'WHSBY', status: NodeStatus.UP, quantity: 100, lastTxId: 0 },
    WHMDN: { id: 'WHMDN', status: NodeStatus.UP, quantity: 100, lastTxId: 0 },
  });
  const [txCounter, setTxCounter] = useState(0);
  const [recoveryLog, setRecoveryLog] = useState([]);   
  const [toast, setToast] = useState(null);

  /* POLLING */
  useEffect(() => {
    const fetchStatus = () => {
      fetch('/api/status').then(res => res.json()).then(data => {
        if (data.nodes) {
          setNodes(prev => {
            const next = { ...prev };
            Object.keys(data.nodes).forEach(k => {
               if (!next[k]) next[k] = { id: k, status: NodeStatus.UP, quantity: 0, lastTxId: 0 };
               const backendNode = data.nodes[k];
               next[k].status = backendNode.status;
               next[k].recoverProgress = backendNode.recoverProgress || 0;
               if (backendNode.status !== 'DOWN' && backendNode.status !== 'DISCONNECTED') {
                 next[k].quantity = backendNode.quantity;
                 next[k].lastTxId = backendNode.lastTxId;
                 if (backendNode.dataset) next[k].dataset = backendNode.dataset;
               }
            });
            return next;
          });
        }
        if (data.txCounter !== undefined) setTxCounter(data.txCounter);
        if (data.recoveryLog) setRecoveryLog(data.recoveryLog);
      }).catch(() => {});
    };
    fetchStatus();
    const interval = setInterval(fetchStatus, 1500);
    return () => clearInterval(interval);
  }, []);

  /* ACTIONS */
  const showToast = useCallback((type, title, message) => setToast({ type, title, message }), []);

  const handleRandom = useCallback(() => {
    const delta = Math.floor(Math.random() * 41) - 20;
    setDeltaValue(String(delta));
  }, []);

  const handleWrite = useCallback(() => {
    const delta = parseInt(deltaValue, 10);
    if (isNaN(delta)) {
      showToast('error', 'Lỗi nhập liệu', 'Vui lòng nhập một số lượng hợp lệ.');
      return;
    }

    fetch('/api/write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sku: selectedSku, delta })
    })
    .then(res => res.json().then(data => ({status: res.status, body: data})))
    .then(({status, body}) => {
      if (status === 200) {
        showToast('success', 'Ghi thành công', `Giao dịch TX-${body.tx_id} đã phân tán.`);
      } else {
        showToast('error', 'Giao dịch thất bại', body.error);
      }
    }).catch(err => showToast('error', 'Lỗi mạng', 'Không thể kết nối.'));
  }, [showToast, selectedSku, deltaValue]);

  const handleRead = useCallback((nodeId) => {
    fetch(`/api/read?node_id=${nodeId}&sku=${selectedSku}`)
    .then(res => res.json().then(data => ({status: res.status, body: data})))
    .then(({status, body}) => {
      if (status === 200) {
        showToast('success', `Dữ liệu từ Trạm ${nodeId}`, `Mã: ${body.sku}, Tồn: ${body.quantity}`);
      } else {
        showToast('error', `Từ chối truy vấn Trạm ${nodeId}`, body.error || body.reason);
      }
    });
  }, [showToast, selectedSku]);

  const handleReset = useCallback(() => {
    fetch('/api/reset', { method: 'POST' }).then(() => {
      showToast('success', 'Khôi Phục', 'Hệ thống đã được reset sạch.');
    });
  }, [showToast]);

  const upCount = Object.values(nodes).filter(n => n.status === NodeStatus.UP).length;
  const downCount = Object.values(nodes).filter(n => n.status === NodeStatus.DOWN).length;

  /* SVG NETWORK MAP DEFINITIONS */
  // Center: 300, 300
  const centerPos = { x: 300, y: 300 };
  const nodePositions = {
    WHBDG: { x: 100, y: 150, title: 'Trạm Bangkok' },
    WHDPS: { x: 500, y: 150, title: 'Trạm Denpasar' },
    WHJKT: { x: 550, y: 350, title: 'Trạm Jakarta' },
    WHMDN: { x: 400, y: 500, title: 'Trạm Medan' },
    WHSBY: { x: 150, y: 450, title: 'Trạm Surabaya' }
  };

  const getNodeColor = (status) => {
    if (status === 'DOWN') return { border: '#ef4444', bg: '#fef2f2', text: '#b91c1c' };
    if (status === 'RECOVERING') return { border: '#eab308', bg: '#fefce8', text: '#a16207' };
    return { border: '#10b981', bg: '#f0fdf4', text: '#047857' };
  };

  return (
    <div className="min-h-screen flex flex-col bg-slate-50">
      <Toast toast={toast} onDismiss={() => setToast(null)}/>

      {/* HEADER */}
      <header className="bg-white border-b border-slate-200 px-6 py-4 shadow-sm sticky top-0 z-40">
        <div className="max-w-[1400px] mx-auto flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/30">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            </div>
            <div>
              <h1 className="font-extrabold text-slate-800 text-lg leading-tight tracking-tight">SmartWarehouse Center</h1>
              <p className="text-xs text-slate-500 font-medium">Trung Tâm Điều Phối Hệ Thống Phân Tán</p>
            </div>
          </div>
          
          <button onClick={handleReset} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-semibold rounded-lg transition-colors flex items-center gap-2">
            Khởi Động Lại Hệ Thống
          </button>
        </div>
      </header>

      {/* MAIN CONTENT */}
      <main className="flex-1 max-w-[1400px] mx-auto w-full p-6">
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
          
          {/* NETWORK TOPOLOGY MAP (Left - 7 cols) */}
          <div className="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col">
            <h2 className="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
              <svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
              Bản Đồ Mạng Lưới (Network Topology Map)
            </h2>
            
            <div className="relative flex-1 min-h-[550px] bg-slate-50 rounded-xl border border-slate-100 overflow-hidden flex items-center justify-center">
              <svg width="600" height="600" className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 overflow-visible">
                {/* Lines */}
                {Object.keys(nodePositions).map(k => {
                  const pos = nodePositions[k];
                  const status = nodes[k] ? nodes[k].status : 'DOWN';
                  const isDown = status === 'DOWN';
                  const strokeColor = isDown ? '#fca5a5' : '#60a5fa'; // Red/Blue
                  return (
                    <g key={`line-${k}`}>
                      <line x1={centerPos.x} y1={centerPos.y} x2={pos.x} y2={pos.y} 
                            stroke={strokeColor} strokeWidth="3" className={!isDown ? 'anim-line' : ''} />
                    </g>
                  );
                })}
                
                {/* Center Node (Coordinator) */}
                <g transform={`translate(${centerPos.x}, ${centerPos.y})`}>
                  <rect x="-60" y="-45" width="120" height="90" rx="15" fill="white" stroke="#3b82f6" strokeWidth="3" className="shadow-lg" />
                  <text x="0" y="-5" textAnchor="middle" className="text-sm font-bold fill-slate-800">COORDINATOR</text>
                  <rect x="-40" y="10" width="80" height="24" rx="12" fill="#eff6ff" />
                  <text x="0" y="26" textAnchor="middle" className="text-xs font-mono font-bold fill-blue-700">TX-{String(txCounter).padStart(3,'0')}</text>
                </g>

                {/* Satellite Nodes */}
                {Object.keys(nodePositions).map(k => {
                  const pos = nodePositions[k];
                  const status = nodes[k] ? nodes[k].status : 'DOWN';
                  const colors = getNodeColor(status);
                  
                  const qtyItem = nodes[k] && nodes[k].dataset ? nodes[k].dataset.find(x => x.SKU === selectedSku) : null;
                  const displayQty = qtyItem ? qtyItem.Quantity : (nodes[k] ? nodes[k].quantity : 0);

                  const isPulseClass = status === 'DOWN' ? 'node-pulse-down' : status === 'RECOVERING' ? 'node-pulse-rec' : 'node-pulse-up';

                  return (
                    <g key={k} transform={`translate(${pos.x}, ${pos.y})`} className={`cursor-pointer ${isPulseClass}`}>
                      <rect x="-55" y="-55" width="110" height="110" rx="20" fill={colors.bg} stroke={colors.border} strokeWidth="3" style={{ filter: `drop-shadow(0 4px 15px ${colors.border}40)` }} />
                      
                      {/* Data Value */}
                      <g transform="translate(0, 16)">
                        <rect x="-24" y="-12" width="48" height="24" rx="12" fill={colors.bg} stroke={colors.border} strokeWidth="2" className="transition-colors duration-300"/>
                        <text x="0" y="4" textAnchor="middle" fill={colors.text} fontSize="13" fontWeight="bold" fontFamily="monospace">
                          {displayQty}
                        </text>
                      </g>

                      {/* Icon container */}
                      <rect x="-25" y="-40" width="50" height="50" rx="10" fill="white" stroke={colors.border} strokeWidth="2" />
                      <path d="M-10,-25 L10,-25 L15,-15 L15,0 L-15,0 L-15,-15 Z" fill="none" stroke={colors.border} strokeWidth="2" />
                      <rect x="-5" y="-10" width="10" height="10" fill={colors.border} />
                      
                      {/* Text */}
                      <text x="0" y="25" textAnchor="middle" className="text-sm font-bold" fill={colors.text}>{k}</text>
                      
                      {status === 'UP' && <text x="0" y="42" textAnchor="middle" className="text-xs font-mono font-bold fill-slate-500">Tồn: {nodes[k].quantity}</text>}
                      {status === 'DOWN' && <text x="0" y="42" textAnchor="middle" className="text-xs font-bold fill-red-600">OFFLINE</text>}
                      {status === 'RECOVERING' && <text x="0" y="42" textAnchor="middle" className="text-xs font-bold fill-yellow-600">{nodes[k].recoverProgress.toFixed(0)}%</text>}
                      
                      {/* Status dot */}
                      {status === 'DOWN' && <circle cx="40" cy="-40" r="10" fill="#ef4444" stroke="white" strokeWidth="2" />}
                      {status === 'DOWN' && <text x="40" y="-36" textAnchor="middle" fill="white" fontSize="12" fontWeight="bold">!</text>}
                    </g>
                  );
                })}
              </svg>
            </div>
          </div>

          {/* RIGHT PANELS (Right - 5 cols) */}
          <div className="lg:col-span-5 flex flex-col gap-6">
            
            {/* System Monitor */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <h3 className="text-sm font-bold text-slate-800 mb-4 uppercase tracking-wider text-slate-500">Giám Sát Hệ Thống (Real-time Monitor)</h3>
              
              <div className="grid grid-cols-2 gap-4 mb-5">
                <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 flex flex-col justify-center items-center">
                  <div className="text-3xl font-black text-emerald-600 mb-1">{upCount}</div>
                  <div className="text-xs font-bold text-emerald-800 uppercase">ONLINE NODES</div>
                </div>
                <div className={`border rounded-xl p-4 flex flex-col justify-center items-center ${downCount > 0 ? 'bg-red-50 border-red-200' : 'bg-slate-50 border-slate-200'}`}>
                  <div className={`text-3xl font-black mb-1 ${downCount > 0 ? 'text-red-600' : 'text-slate-400'}`}>{downCount}</div>
                  <div className={`text-xs font-bold uppercase ${downCount > 0 ? 'text-red-800' : 'text-slate-500'}`}>DISCONNECTED</div>
                </div>
              </div>

              {/* Transactions Panel */}
              <div className="border-t border-slate-100 pt-5">
                <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 mb-4">
                  <label className="text-xs text-slate-500 font-bold mb-1.5 block uppercase">Mặt hàng thao tác (SKU)</label>
                  <select 
                    className="w-full bg-white border border-slate-300 text-slate-800 font-medium rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors mb-3"
                    value={selectedSku}
                    onChange={(e) => setSelectedSku(e.target.value)}
                  >
                    {(nodes['WHBDG'] && nodes['WHBDG'].dataset && nodes['WHBDG'].dataset.length > 0) 
                      ? nodes['WHBDG'].dataset.map(item => (
                          <option key={item.SKU} value={item.SKU}>{item.SKU}</option>
                        ))
                      : <option value="SKU0001">SKU0001</option>
                    }
                  </select>

                  <label className="text-xs text-slate-500 font-bold mb-1.5 block uppercase">Số lượng thay đổi (Delta)</label>
                  <div className="flex gap-2">
                    <input 
                      type="number" 
                      placeholder="VD: 50, -20..." 
                      className="flex-1 bg-white border border-slate-300 text-slate-800 font-medium rounded-lg px-3 py-2.5 outline-none focus:border-blue-500 transition-colors"
                      value={deltaValue}
                      onChange={(e) => setDeltaValue(e.target.value)}
                      onKeyDown={(e) => e.key === 'Enter' && handleWrite()}
                    />
                    <button onClick={handleRandom} title="Tạo số ngẫu nhiên"
                      className="px-3 py-2.5 bg-slate-200 hover:bg-slate-300 rounded-lg text-slate-700 transition-colors font-bold text-lg flex items-center justify-center">
                      🎲
                    </button>
                  </div>
                </div>
                
                <button onClick={handleWrite}
                  className="w-full py-3.5 rounded-xl font-bold text-white transition-all
                    bg-blue-600 hover:bg-blue-700 shadow-md shadow-blue-600/20
                    flex items-center justify-center gap-2 mb-3">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                  Ghi Phân Tán (Write All)
                </button>

                <div className="grid grid-cols-2 gap-2">
                  {Object.keys(nodePositions).map(id => (
                    <button key={`read-${id}`} onClick={() => handleRead(id)}
                      className="py-2 px-3 rounded-lg text-xs font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-200 transition-colors flex items-center justify-center gap-1.5">
                      <svg className="w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                      Đọc {id}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Recovery Log */}
            <div className="flex-1 min-h-[250px]">
              <RecoveryLogPanel entries={recoveryLog}/>
            </div>
            
          </div>
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
