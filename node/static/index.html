<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Trạm Kho Hàng</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 + ReactDOM + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body { background-color: #f8fafc; color: #0f172a; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="min-h-screen">

<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;

  const App = () => {
    const [nodeData, setNodeData] = useState(null);
    const [walData, setWalData] = useState([]);
    const [selectedSku, setSelectedSku] = useState("SKU0001");
    const [deltaValue, setDeltaValue] = useState("");
    const [isOffline, setIsOffline] = useState(false); // To detect if node is unreachable from UI
    const [readResult, setReadResult] = useState(null); // { type: 'success'|'error', title: string, message: string, details?: any }

    const fetchStatus = useCallback(() => {
      fetch('/status')
        .then(res => {
          if (!res.ok && res.status !== 503) throw new Error('Network error');
          return res.json();
        })
        .then(data => {
          setIsOffline(false);
          // 503 from backend returns {"error": "Node DOWN"}
          if (data.error === "Node DOWN") {
            setNodeData(prev => prev ? { ...prev, status: "DOWN" } : { status: "DOWN", node_id: "UNKNOWN" });
          } else {
            setNodeData(data);
          }
        })
        .catch(err => {
          setIsOffline(true);
        });
    }, []);

    const fetchWal = useCallback(() => {
      fetch('/api/wal')
        .then(res => res.json())
        .then(data => {
          setWalData(data.wal || []);
        })
        .catch(err => console.error(err));
    }, []);

    useEffect(() => {
      fetchStatus();
      fetchWal();
      const interval = setInterval(() => {
        fetchStatus();
        fetchWal();
      }, 2000);
      return () => clearInterval(interval);
    }, [fetchStatus, fetchWal]);

    // Derived states
    const isDown = nodeData && nodeData.status === "DOWN";
    const isRecovering = nodeData && nodeData.status === "RECOVERING";
    const isUp = nodeData && nodeData.status === "UP";
    const nodeId = nodeData ? nodeData.node_id : "LOADING...";

    // Actions
    const handleCrash = () => {
      fetch('/crash', { method: 'POST' }).then(() => {
        fetchStatus();
      });
    };

    const handleRecover = () => {
      fetch('/recover', { method: 'POST' }).then(() => {
        fetchStatus();
      });
    };

    const handleLocalRead = () => {
      fetch(`/read?sku=${selectedSku}`)
        .then(res => res.json().then(data => ({status: res.status, body: data})))
        .then(({status, body}) => {
          if (status !== 200) {
            setReadResult({
              type: 'error',
              title: 'Từ Chối Truy Vấn',
              message: body.error || body.reason || 'Unknown error'
            });
          } else {
            setReadResult({
              type: 'success',
              title: `Kết Quả Truy Vấn (Kho ${nodeId})`,
              message: 'Dữ liệu đọc thành công từ cơ sở dữ liệu cục bộ.',
              details: [
                { label: 'Mã Hàng (SKU)', value: body.sku },
                { label: 'Số Lượng', value: body.quantity },
                { label: 'Phiên Bản (TX)', value: `TX-${String(body.lastTxId).padStart(3, '0')}` }
              ]
            });
          }
        })
        .catch(err => {
          setReadResult({
            type: 'error',
            title: 'Lỗi Kết Nối',
            message: 'Không thể gửi yêu cầu đến máy chủ kho hàng.'
          });
        });
    };

    const handleRandom = () => {
      const delta = Math.floor(Math.random() * 41) - 20;
      setDeltaValue(String(delta));
    };

    const handleProxyWrite = () => {
      const delta = parseInt(deltaValue, 10);
      if (isNaN(delta)) {
        setReadResult({ type: 'error', title: 'Lỗi', message: 'Vui lòng nhập số hợp lệ' });
        return;
      }
      
      fetch('/proxy_write', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sku: selectedSku, delta })
      })
      .then(res => res.json().then(data => ({status: res.status, body: data})))
      .then(({status, body}) => {
        if (status === 200) {
          setReadResult({ type: 'success', title: 'Ghi thành công', message: `Giao dịch TX-${body.tx_id} đã được gửi đến Coordinator.` });
        } else {
          setReadResult({ type: 'error', title: 'Giao dịch thất bại', message: body.error || 'Unknown error' });
        }
      })
      .catch(err => setReadResult({ type: 'error', title: 'Lỗi', message: 'Không thể kết nối' }));
    };

    // Calculate displayed quantity based on selected SKU
    let displayQty = '—';
    if (nodeData && nodeData.dataset) {
      const item = nodeData.dataset.find(x => x.SKU === selectedSku);
      if (item) {
        displayQty = item.Quantity;
      }
    }

    return (
      <div className="min-h-screen flex flex-col bg-slate-50">
        
        {/* Modal Thông Báo Đọc Dữ Liệu */}
        {readResult && (
          <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-[fadeIn_0.2s_ease-out]">
              <div className={`px-5 py-4 ${readResult.type === 'error' ? 'bg-red-50 border-b border-red-100' : 'bg-emerald-50 border-b border-emerald-100'} flex items-start gap-3`}>
                <div className={`p-2 rounded-full ${readResult.type === 'error' ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}`}>
                  {readResult.type === 'error' 
                    ? <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    : <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                  }
                </div>
                <div className="flex-1 mt-1">
                  <h3 className={`text-lg font-bold ${readResult.type === 'error' ? 'text-red-900' : 'text-emerald-900'}`}>{readResult.title}</h3>
                  <p className={`text-sm mt-1 ${readResult.type === 'error' ? 'text-red-700' : 'text-emerald-700'}`}>{readResult.message}</p>
                </div>
              </div>
              
              {readResult.details && (
                <div className="p-5 bg-slate-50 border-b border-slate-100">
                  <div className="space-y-3">
                    {readResult.details.map((d, i) => (
                      <div key={i} className="flex justify-between items-center bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                        <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">{d.label}</span>
                        <span className="font-mono font-bold text-slate-800 text-base">{d.value}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              
              <div className="p-4 bg-white flex justify-end">
                <button 
                  onClick={() => setReadResult(null)}
                  className="px-6 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-lg transition-colors border border-slate-300"
                >
                  Đóng
                </button>
              </div>
            </div>
          </div>
        )}

        {/* HEADER */}
        <header className="bg-white border-b border-slate-200 px-6 py-4 shadow-sm sticky top-0 z-40">
          <div className="max-w-[1200px] mx-auto flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/30">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
              </div>
              <div>
                <h1 className="font-extrabold text-slate-800 text-lg leading-tight tracking-tight">Trạm Lưu Trữ: <span className="text-blue-600">{nodeId}</span></h1>
                <p className="text-xs text-slate-500 font-medium">Hệ Thống Phân Tán</p>
              </div>
            </div>
            
            <div className="flex items-center space-x-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
              <div className={`w-2.5 h-2.5 rounded-full ${isOffline ? 'bg-slate-400' : isDown ? 'bg-red-500' : isRecovering ? 'bg-yellow-500 animate-pulse' : 'bg-emerald-500'}`}></div>
              <span className={`text-xs font-bold uppercase tracking-wider ${isOffline ? 'text-slate-500' : isDown ? 'text-red-600' : isRecovering ? 'text-yellow-600' : 'text-emerald-600'}`}>
                {isOffline ? 'DISCONNECTED' : nodeData ? nodeData.status : 'CONNECTING...'}
              </span>
            </div>
          </div>
        </header>

        {/* MAIN CONTENT */}
        <main className="flex-1 max-w-[1200px] mx-auto w-full p-6">
          
          {isOffline && (
            <div className="bg-red-50 border border-red-200 p-4 rounded-xl mb-6 flex items-start gap-3">
              <svg className="w-6 h-6 text-red-500 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
              <div>
                <h4 className="text-red-800 font-bold">Lỗi Kết Nối</h4>
                <p className="text-red-600 text-sm">Không thể kết nối đến máy chủ kho hàng (Container có thể đã bị Stop).</p>
              </div>
            </div>
          )}

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-6">
            
            {/* CỘT TRÁI: THÔNG TIN HÀNG HÓA (7 cols) */}
            <div className="lg:col-span-7 bg-white shadow-sm border border-slate-200 rounded-2xl p-5 relative overflow-hidden flex flex-col">
              <div className="absolute -bottom-10 -right-4 text-[120px] font-black text-slate-50 select-none z-0 pointer-events-none">
                {nodeId}
              </div>
              
              <div className="relative z-10 flex flex-col flex-1">
                <h2 className="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                  Tồn Kho Hiện Tại
                </h2>
                
                <div className="mb-5 bg-slate-50 p-3 rounded-xl border border-slate-200">
                  <label className="text-xs text-slate-500 font-bold mb-1.5 block uppercase">Mặt hàng thao tác (SKU)</label>
                  <select 
                    className="w-full bg-white border border-slate-300 text-slate-800 font-medium rounded-lg p-2.5 outline-none focus:border-blue-500 transition-colors"
                    value={selectedSku}
                    onChange={(e) => setSelectedSku(e.target.value)}
                    disabled={!nodeData || !nodeData.dataset}
                  >
                    {(nodeData && nodeData.dataset && nodeData.dataset.length > 0) 
                      ? nodeData.dataset.map(item => (
                          <option key={item.SKU} value={item.SKU}>{item.SKU} (Kho: {item.WarehouseID})</option>
                        ))
                      : <option value="SKU0001">Đang tải...</option>
                    }
                  </select>
                </div>

                <div className="flex-1 bg-slate-50 rounded-xl border border-slate-200 flex flex-col items-center justify-center p-8">
                  <div className={`text-7xl font-black mono ${isDown ? 'text-red-500' : isRecovering ? 'text-yellow-500' : 'text-emerald-500'}`}>
                    {displayQty}
                  </div>
                  <div className="text-sm text-slate-500 mt-2 font-bold uppercase tracking-widest">Sản Phẩm Tồn Kho</div>
                </div>
              </div>
            </div>

            {/* CỘT PHẢI: ĐIỀU KHIỂN & TRẠNG THÁI (5 cols) */}
            <div className="lg:col-span-5 bg-white shadow-sm border border-slate-200 rounded-2xl p-5 flex flex-col justify-between">
              <div>
                <h2 className="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                  Bảng Điều Khiển
                </h2>
                
                <div className="space-y-4 mb-6">
                  <div className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-200">
                    <span className="text-sm font-bold text-slate-500 uppercase">Giao Dịch Cuối (TX)</span>
                    <span className="font-mono text-blue-600 font-bold text-lg">{nodeData ? `TX-${String(nodeData.lastTxId).padStart(3, '0')}` : '—'}</span>
                  </div>
                  {isRecovering && nodeData && (
                    <div className="p-4 bg-yellow-50/50 rounded-xl border border-yellow-200">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-xs font-bold text-yellow-700 uppercase">Khôi phục (Catch-up)</span>
                        <span className="text-xs font-bold text-yellow-700 font-mono">{nodeData.recoverProgress ? nodeData.recoverProgress.toFixed(0) : 0}%</span>
                      </div>
                      <div className="w-full bg-yellow-100 rounded-full h-2 overflow-hidden">
                        <div className="bg-yellow-500 h-2 transition-all duration-300" style={{ width: `${nodeData.recoverProgress || 0}%` }}></div>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              <div className="flex flex-col space-y-3">
                <div className="flex gap-2">
                  <input 
                    type="number" 
                    placeholder="Nhập Delta..." 
                    className="flex-1 bg-slate-50 border border-slate-200 text-slate-800 font-medium rounded-xl px-3 py-2.5 outline-none focus:border-blue-500 transition-colors text-sm"
                    value={deltaValue}
                    onChange={(e) => setDeltaValue(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleProxyWrite()}
                    disabled={isDown || isOffline}
                  />
                  <button onClick={handleRandom} title="Tạo số ngẫu nhiên" disabled={isDown || isOffline}
                    className="px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-700 transition-colors font-bold text-base flex items-center justify-center disabled:opacity-50">
                    🎲
                  </button>
                  <button onClick={handleProxyWrite} disabled={isDown || isOffline}
                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm rounded-xl transition-colors flex items-center disabled:opacity-50 shadow-md shadow-blue-500/20">
                    Ghi
                  </button>
                </div>

                <button 
                  onClick={handleLocalRead}
                  disabled={isOffline}
                  className="w-full py-3 rounded-xl font-bold text-sm bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 transition-colors flex items-center justify-center disabled:opacity-50"
                >
                  <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                  Truy Vấn (Đọc cục bộ)
                </button>

                {!isDown ? (
                  <button 
                    onClick={handleCrash}
                    className="w-full py-3 rounded-xl font-bold text-sm bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 transition-colors flex items-center justify-center"
                  >
                    <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Sập Nguồn (Crash)
                  </button>
                ) : (
                  <button 
                    onClick={handleRecover}
                    className="w-full py-3 rounded-xl font-bold text-sm bg-yellow-400 text-yellow-900 hover:bg-yellow-500 shadow-md shadow-yellow-500/20 transition-all flex items-center justify-center animate-pulse"
                  >
                    <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Khởi Động & Khôi Phục
                  </button>
                )}
              </div>
            </div>
          </div>

          {/* BẢNG LOG WAL */}
          <div className="bg-white shadow-sm border border-slate-200 rounded-2xl overflow-hidden flex flex-col">
            <div className="px-5 py-4 bg-slate-50 border-b border-slate-200 flex items-center gap-2">
              <svg className="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
              <h2 className="text-sm font-bold text-slate-800">Nhật Ký Giao Dịch (WAL)</h2>
              <span className="ml-auto mono text-xs text-slate-500 bg-slate-200 px-2 py-0.5 rounded-full">
                {walData.length} bản ghi
              </span>
            </div>
            
            <div className="flex-1 overflow-y-auto p-4 max-h-[300px]">
              {walData.length === 0 ? (
                <div className="text-center py-8 text-slate-400 text-sm font-medium">Chưa có giao dịch (WAL trống)</div>
              ) : (
                <div className="space-y-2">
                  {walData.slice().reverse().map((entry, idx) => {
                    const delta = entry.new_qty - entry.old_qty;
                    const date = new Date(entry.timestamp * 1000).toLocaleTimeString();
                    return (
                      <div key={idx} className="bg-white border border-slate-200 rounded-xl p-3 shadow-sm flex items-center justify-between hover:border-blue-200 transition-colors">
                        <div className="flex flex-col">
                          <span className="mono text-xs font-bold text-slate-700">TX-{String(entry.tx_id).padStart(3, '0')}</span>
                          <span className="mono text-[10px] text-slate-400">{date}</span>
                        </div>
                        <div className="mono text-xs font-bold text-slate-700 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100 flex items-center">
                          <span className="mr-3">{entry.sku}</span>
                          <span className="text-red-500 line-through mr-1 font-normal">{entry.old_qty}</span>
                          <span className="text-slate-400 font-normal">→</span>
                          <span className="text-emerald-600 ml-1">{entry.new_qty}</span>
                          <span className={`ml-3 text-[10px] px-1.5 py-0.5 rounded-sm ${delta > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
                            {delta > 0 ? '+'+delta : delta}
                          </span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </main>
      </div>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
